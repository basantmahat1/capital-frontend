<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capital IT Solution</title>
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
    <style>
      *{ margin:0; padding:0; box-sizing:border-box; }
      body{ overflow: auto; background:linear-gradient(135deg,#34284f,#002f3d); font-family:Arial,sans-serif; min-height: 100vh; }
      #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: linear-gradient(135deg,#34284f,#002f3d); }
      #particles-js{ position:absolute; width:100%; height:100%; }
      .loader-center{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:160px; height:160px; display:flex; justify-content:center; align-items:center; }
      .circle{ position:absolute; width:130px; height:130px; border:1px solid rgba(255,255,255,.25); border-radius:50%; animation:pulse 2s infinite ease-in-out; }
      .logo{ height:100px ; width:100px; z-index:2; border-radius: 50%; }
      .loading{ position:absolute; bottom:50px; width:100%; text-align:center; color:white; letter-spacing:3px; font-size:18px; }
      @keyframes pulse{
          0%{ transform:scale(1); opacity:.4; }
          50%{ transform:scale(1.08); opacity:1; }
          100%{ transform:scale(1); opacity:.4; }
      }
    </style>
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader">
      <div id="particles-js"></div>
      <div class="loader-center">
          <div class="circle"></div>
          <img src="/logo.png" class="logo" alt="Logo">
      </div>
      <div class="loading">LOADING...</div>
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
      particlesJS("particles-js", {
        particles: {
          number: { value: 60 },
          color: { value: "#ffffff" },
          shape: { type: "circle" },
          opacity: { value: 0.8 },
          size: { value: 2 },
          line_linked: { enable: true, distance: 150, color: "#ffffff", opacity: 0.1, width: 1 },
          move: { enable: true, speed: 1 }
        }
      });

      // Remove preloader once app is loaded
      window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        if (preloader) {
            preloader.style.display = 'none';
            document.body.style.overflow = 'auto'; // Re-enable scroll
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
